<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexSoftwares Web Music Player</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container py-4 py-lg-5">
        <div class="row g-4 align-items-start">

            <!-- Player Column -->
            <section class="col-12 col-lg-7">
                <div class="player-card">

                    <!-- Album Cover -->
                    <div class="cover-wrapper">
                        <div id="album-cover" class="album-cover">
                            <span class="cover-emoji">🎵</span>
                        </div>
                    </div>

                    <!-- Song Info -->
                    <div class="text-center mt-4">
                        <h1 id="song-title" class="song-title">
                            Select a Song
                        </h1>

                        <p id="song-artist" class="song-artist">
                            Artist Name
                        </p>
                    </div>

                    <!-- Progress -->
                    <div class="progress-section mt-4">

                        <input
                            type="range"
                            id="progress-bar"
                            min="0"
                            max="100"
                            value="0"
                            class="form-range"
                        >

                        <div class="d-flex justify-content-between time-row">
                            <span id="current-time">00:00</span>
                            <span id="total-duration">00:00</span>
                        </div>

                    </div>

                    <!-- Controls -->
                    <div class="controls text-center mt-4">

                        <button id="shuffle-btn" class="control-btn ghost-btn">
                            🔀
                        </button>

                        <button id="prev-btn" class="control-btn ghost-btn">
                            ⏮
                        </button>

                        <button id="play-btn" class="play-btn">
                            ▶
                        </button>

                        <button id="next-btn" class="control-btn ghost-btn">
                            ⏭
                        </button>

                        <button id="repeat-btn" class="control-btn ghost-btn">
                            🔁
                        </button>

                    </div>

                    <!-- Volume -->
                    <section class="volume-section mt-4">

                        <div class="d-flex align-items-center gap-3">

                            <button id="mute-btn" class="control-btn ghost-btn">
                                🔊
                            </button>

                            <input
                                type="range"
                                id="volume-slider"
                                min="0"
                                max="100"
                                value="75"
                                class="form-range flex-grow-1"
                            >

                            <span id="volume-value">
                                75%
                            </span>

                        </div>

                    </section>

                </div>
            </section>

            <!-- Playlist Column -->
            <aside class="col-12 col-lg-5">

                <div class="playlist-card">

                    <div class="playlist-header">
                        <h2>Playlist</h2>
                        <p>5 Tracks</p>
                    </div>

                    <div id="playlist-container" class="playlist-container">

                        <!-- Songs inserted by JavaScript -->

                    </div>

                </div>

            </aside>

        </div>
    </main>

    <!-- jQuery -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <!-- Bootstrap JS Bundle -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Custom JS -->
    <script src="script.js"></script>

</body>
</html>
